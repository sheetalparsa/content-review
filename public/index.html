<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Content Review Queue</title>
    <style>
      :root { color-scheme: light; font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif; }
      body { margin: 0; padding: 24px; background: #0b1220; color: #e7eefc; }
      .card { max-width: 880px; margin: 0 auto; background: #111b31; border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; padding: 16px; }
      h1 { font-size: 18px; margin: 0 0 12px; }
      label { display: block; font-size: 12px; opacity: 0.9; margin-bottom: 6px; }
      input, select { width: 100%; padding: 10px 12px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.12); background: #0b1220; color: #e7eefc; }
      button { padding: 10px 12px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.12); background: #243a6a; color: #e7eefc; cursor: pointer; }
      button:disabled { opacity: 0.6; cursor: not-allowed; }
      .row { display: grid; grid-template-columns: 1fr 1fr 140px; gap: 12px; align-items: end; }
      .muted { opacity: 0.8; font-size: 12px; }
      .tickets { margin-top: 16px; display: grid; gap: 10px; }
      .ticket { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); padding: 12px; border-radius: 12px; display: grid; grid-template-columns: 1fr 140px; gap: 12px; align-items: center; }
      .ticket-title { font-weight: 600; }
      .pill { font-size: 12px; padding: 2px 8px; border-radius: 999px; background: rgba(74, 222, 128, 0.14); border: 1px solid rgba(74, 222, 128, 0.22); display: inline-block; }
      .bar { display:flex; justify-content: space-between; gap: 12px; align-items: center; margin: 12px 0 0; }
      pre { white-space: pre-wrap; word-break: break-word; background: rgba(0,0,0,0.25); padding: 12px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.08); }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Locale-based Content Review Queue</h1>
      <div class="row">
        <div>
          <label for="reviewerId">Reviewer ID</label>
          <input id="reviewerId" placeholder="e.g. r1" />
        </div>
        <div>
          <label for="locale">Locale</label>
          <select id="locale">
            <option value="west-coast">West Coast</option>
            <option value="east-coast">East Coast</option>
            <option value="midwest">Midwest</option>
            <option value="south">South</option>
          </select>
        </div>
        <div>
          <button id="loginBtn">Login</button>
        </div>
      </div>
      <div class="bar">
        <div class="muted" id="status">Not authenticated</div>
        <div style="display:flex; gap: 8px;">
          <button id="refreshBtn" disabled>Refresh tickets</button>
          <button id="logoutBtn" disabled>Logout</button>
        </div>
      </div>

      <div style="margin-top: 16px;">
        <div class="muted">My tickets</div>
        <div class="tickets" id="mine"></div>
      </div>
      <div style="margin-top: 16px;">
        <div class="muted">Available tickets</div>
        <div class="tickets" id="tickets"></div>
      </div>
      <div style="margin-top: 16px;">
        <div class="muted">Debug</div>
        <pre id="debug"></pre>
      </div>
    </div>
    <script type="module" src="/app.js"></script>
  </body>
</html>
