services:
  api:
    build: .
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - DB_PATH=/data/app.db
      - RESERVATION_TTL_SECONDS=1200
      - RELEASE_SWEEP_INTERVAL_SECONDS=10
      - SEED_ON_STARTUP=true
      - JWT_SECRET=dev-secret-change-me
    volumes:
      - app_data:/data

volumes:
  app_data:

